name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run check

      - name: Build zip + crx
        env:
          CRX_KEY: ${{ secrets.CRX_KEY }}
        run: npm run build

      - name: Read version
        id: v
        run: echo "version=$(node -p "require('./src/manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twivido-${{ steps.v.outputs.version }}
          path: dist/*
          if-no-files-found: error

      # Rolling "latest" release with stable filenames (permanent download URLs),
      # refreshed on every push to main.
      - name: Prepare rolling assets
        if: github.ref == 'refs/heads/main'
        run: |
          cp "dist/twivido-${{ steps.v.outputs.version }}.zip" dist/twivido-latest.zip
          cp "dist/twivido-${{ steps.v.outputs.version }}.crx" dist/twivido-latest.crx

      - name: Clean previous latest assets
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for a in $(gh release view latest --json assets -q '.assets[].name' 2>/dev/null); do
            gh release delete-asset latest "$a" -y || true
          done

      - name: Publish rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (v${{ steps.v.outputs.version }})
          prerelease: false
          make_latest: true
          files: |
            dist/twivido-latest.zip
            dist/twivido-latest.crx
          body: |
            Automated build from `main` — v${{ steps.v.outputs.version }} (`${{ github.sha }}`).

            - **`twivido-latest.zip`** — unzip, then `chrome://extensions` → Developer mode → Load unpacked.
            - **`twivido-latest.crx`** — signed package.

            Permanent links:
            `https://github.com/k41n/twivido/releases/download/latest/twivido-latest.zip`

      # Permanent, versioned release when a v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
