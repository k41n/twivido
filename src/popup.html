<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        background: #15202b;
        color: #e7e9ea;
        font: 14px/1.45 -apple-system, system-ui, "Segoe UI", sans-serif;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: #1d9bf0; }
      p { margin: 0 0 12px; color: #cbd5e1; }
      .card {
        border: 1px solid #38444d;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }
      button.dl {
        width: 100%;
        background: #1d9bf0;
        color: #fff;
        border: none;
        border-radius: 9999px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.dl:disabled { opacity: .6; cursor: default; }
      .status { font-size: 12px; color: #8b98a5; margin-top: 8px; min-height: 15px; }
      ul { margin: 6px 0 0; padding-left: 18px; color: #8b98a5; font-size: 12px; }
      li { margin: 3px 0; }
      a { color: #1d9bf0; text-decoration: none; }
    </style>
  </head>
  <body>
    <h1><span class="dot"></span> Twivido</h1>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
